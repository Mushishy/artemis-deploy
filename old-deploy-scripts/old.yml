---
- name: Deploy Artemis Infrastructure
  hosts: localhost
  become: yes
  vars:
    go_version: "1.25.1"
    go_url: "https://go.dev/dl/go{{ go_version }}.linux-amd64.tar.gz"
    go_install_dir: "/usr/local/go"
    node_version: "v25.6.0"
    node_url: "https://nodejs.org/dist/{{ node_version }}/node-{{ node_version }}-linux-x64.tar.xz"
    scenario_api_dir: "/opt/scenario-manager-api"
    frontend_dir: "/opt/artemis-frontend"
    ssl_dir: "/etc/nginx/ssl"
    
  tasks:
    # ========================================
    # CLEANUP TASKS - Run before installation
    # ========================================
    
    - name: Stop all services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - scenario-manager-api
        - artemis-frontend
        - nginx
      failed_when: false
      ignore_errors: yes

    - name: Disable all services
      systemd:
        name: "{{ item }}"
        enabled: no
      loop:
        - scenario-manager-api
        - artemis-frontend
        - nginx
      failed_when: false
      ignore_errors: yes

    - name: Remove systemd service files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/scenario-manager-api.service
        - /etc/systemd/system/artemis-frontend.service

    - name: Uninstall nginx completely
      apt:
        name: nginx*
        state: absent
        purge: yes
        autoremove: yes

    - name: Remove nginx directories and configs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx
        - /var/log/nginx
        - /var/lib/nginx
        - /usr/share/nginx

    - name: Remove Go installation
      file:
        path: "{{ go_install_dir }}"
        state: absent

    - name: Remove Node.js installation
      shell: |
        rm -rf /usr/local/bin/node
        rm -rf /usr/local/bin/npm
        rm -rf /usr/local/bin/npx
        rm -rf /usr/local/lib/node_modules
        rm -rf /usr/local/include/node
        rm -rf /usr/local/share/man/man1/node*
        rm -rf /usr/local/share/systemtap/tapset/node.stp
      failed_when: false

    - name: Remove application directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ scenario_api_dir }}"
        - "{{ frontend_dir }}"
        - "{{ ssl_dir }}"

    - name: Clean up cache and temp files
      shell: |
        rm -rf /var/www/.npm
        rm -rf /tmp/go*
        rm -rf /tmp/node-*
        rm -rf ~/.npm
        rm -rf /root/.npm
        rm -rf /home/*/.npm
      failed_when: false

    - name: Kill leftover processes
      shell: |
        pkill -f scenario-manager-api || true
        pkill -f artemis-frontend || true
        pkill -f nginx || true
      failed_when: false

    - name: Reload systemd after cleanup
      systemd:
        daemon_reload: yes

    - name: Wait for cleanup to complete
      pause:
        seconds: 2

    # ========================================
    # INSTALLATION TASKS
    # ========================================
    # Install system dependencies
    - name: Install system packages
      apt:
        name:
          - git
          - openssl
          - nginx
          - nano 
          - vim 
          - tmux 
          - net-tools
        state: present
        update_cache: yes

    # Ensure required users exist
    - name: Ensure ludus user exists
      user:
        name: ludus
        system: yes
        shell: /bin/bash
        home: /home/ludus
        create_home: yes

    # Go installation and setup
    - name: Check if Go is installed with correct version
      command: /usr/local/go/bin/go version
      register: go_version_check
      failed_when: false
      changed_when: false

    - name: Download and install Go
      block:
        - name: Download Go tarball
          get_url:
            url: "{{ go_url }}"
            dest: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
            mode: '0644'
            
        - name: Remove existing Go installation
          file:
            path: "{{ go_install_dir }}"
            state: absent
            
        - name: Extract Go tarball
          unarchive:
            src: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
            dest: "/usr/local"
            creates: "{{ go_install_dir }}/bin/go"
            
        - name: Clean up Go tarball
          file:
            path: "/tmp/go{{ go_version }}.linux-amd64.tar.gz"
            state: absent
      when: go_version_check.rc != 0 or go_version not in go_version_check.stdout | default('')

    - name: Add Go to PATH
      lineinfile:
        path: /etc/environment
        line: 'PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/usr/local/go/bin"'
        regexp: '^PATH='
        state: present

    # Scenario Manager API setup
    - name: Add git safe directory for scenario-manager-api
      git_config:
        scope: global
        name: safe.directory
        value: "{{ scenario_api_dir }}"
      
    - name: Remove existing scenario-manager-api to ensure clean clone
      file:
        path: "{{ scenario_api_dir }}"
        state: absent
      
    - name: Clone scenario-manager-api repository
      git:
        repo: "https://github.com/Mushishy/scenario-manager-api"
        dest: "{{ scenario_api_dir }}"
        version: main
      register: scenario_api_cloned

    - name: Create scenario-manager-api directories
      file:
        path: "{{ item }}"
        state: directory
        owner: ludus
        group: ludus
        mode: '0755'
      loop:
        - "{{ scenario_api_dir }}/certs"
        - "{{ scenario_api_dir }}/data/pools"
        - "{{ scenario_api_dir }}/data/scenarios" 
        - "{{ scenario_api_dir }}/data/topologies"

    - name: Generate SSL certificates for scenario-manager-api
      command: >
        openssl req -x509 -newkey rsa:4096 -sha256 -nodes -days 3650
        -keyout {{ scenario_api_dir }}/certs/pve-ssl.key
        -out {{ scenario_api_dir }}/certs/pve-ssl.pem
        -subj "/C=SK/ST=Slovakia/L=Bratislava/O=STU/OU=ARTEMIS/CN=100.67.101.72"
      args:
        creates: "{{ scenario_api_dir }}/certs/pve-ssl.pem"

    - name: Set SSL certificate permissions for scenario-manager-api
      file:
        path: "{{ item.path }}"
        owner: ludus
        group: ludus
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ scenario_api_dir }}/certs/pve-ssl.key", mode: '0600' }
        - { path: "{{ scenario_api_dir }}/certs/pve-ssl.pem", mode: '0644' }

    - name: Copy ctfd_topology.yml to data directory
      copy:
        src: "{{ scenario_api_dir }}/server/data/ctfd_topology.yml"
        dest: "{{ scenario_api_dir }}/data/ctfd_topology.yml"
        owner: ludus
        group: ludus
        mode: '0644'

    - name: Copy /opt/scenario-manager-api/schemas directory to scenario-manager-api directory
      copy:
        src: "{{ scenario_api_dir }}/server/schemas/"
        dest: "{{ scenario_api_dir }}/schemas"
        owner: ludus
        group: ludus
        mode: '0755'

    - name: Copy .env.example to .env for scenario-manager-api
      copy:
        src: "{{ scenario_api_dir }}/server/.env.example"
        dest: "{{ scenario_api_dir }}/.env"
        owner: ludus
        group: ludus
        mode: '0644'
        force: no
    
    - name: Copy .env.example to .env for scenario-manager-api
      copy:
        src: "{{ scenario_api_dir }}/server/.env.example"
        dest: "{{ scenario_api_dir }}/server/.env"
        owner: ludus
        group: ludus
        mode: '0644'
        force: no

    - name: Build scenario-manager-api
      shell: |
        cd {{ scenario_api_dir }}/server
        export PATH=$PATH:/usr/local/go/bin
        export CGO_ENABLED=1
        /usr/local/go/bin/go build -ldflags="-w -s" -o scenario-manager-api .
      args:
        creates: "{{ scenario_api_dir }}/server/scenario-manager-api"
      environment:
        PATH: "{{ ansible_env.PATH }}:/usr/local/go/bin"

    - name: Copy scenario-manager-api binary to main directory
      copy:
        src: "{{ scenario_api_dir }}/server/scenario-manager-api"
        dest: "{{ scenario_api_dir }}/scenario-manager-api"
        owner: ludus
        group: ludus
        mode: '0755'

    - name: Install scenario-manager-api systemd service
      copy:
        src: "{{ scenario_api_dir }}/scenario-manager-api.service"
        dest: /etc/systemd/system/scenario-manager-api.service
        mode: '0644'

    - name: Set ownership for scenario-manager-api directory
      file:
        path: "{{ scenario_api_dir }}"
        state: directory
        owner: ludus
        group: ludus
        recurse: yes

    # Node.js installation
    - name: Check if Node.js is installed with correct version
      command: node --version
      register: node_version_check
      failed_when: false
      changed_when: false

    - name: Download and install Node.js
      block:
        - name: Download Node.js tarball
          get_url:
            url: "{{ node_url }}"
            dest: "/tmp/node-{{ node_version }}-linux-x64.tar.xz"
            mode: '0644'
            
        - name: Extract Node.js tarball
          unarchive:
            src: "/tmp/node-{{ node_version }}-linux-x64.tar.xz"
            dest: "/usr/local"
            extra_opts:
              - --strip-components=1
              
        - name: Clean up Node.js tarball
          file:
            path: "/tmp/node-{{ node_version }}-linux-x64.tar.xz"
            state: absent
      when: node_version_check.rc != 0 or node_version not in node_version_check.stdout | default('')

    # Artemis Frontend setup
    - name: Add git safe directory for artemis-frontend
      git_config:
        scope: global
        name: safe.directory
        value: "{{ frontend_dir }}"
    
    - name: Remove existing artemis-frontend to ensure clean clone  
      file:
        path: "{{ frontend_dir }}"
        state: absent
        
    - name: Clone artemis-frontend repository
      git:
        repo: "https://github.com/Mushishy/artemis-frontend.git"
        dest: "{{ frontend_dir }}"
        version: main
      register: frontend_cloned

    - name: Copy .env.example to .env for artemis-frontend
      copy:
        src: "{{ frontend_dir }}/.env.example"
        dest: "{{ frontend_dir }}/.env"
        owner: www-data
        group: www-data
        mode: '0644'
        force: no

    - name: Install artemis-frontend systemd service
      copy:
        src: "{{ frontend_dir }}/artemis-frontend.service"
        dest: /etc/systemd/system/artemis-frontend.service
        mode: '0644'

    - name: Set ownership for artemis-frontend directory
      file:
        path: "{{ frontend_dir }}"
        state: directory
        owner: www-data
        group: www-data
        recurse: yes

    - name: Clean up npm cache and fix ownership
      shell: |
        rm -rf /var/www/.npm
        mkdir -p /var/www/.npm
        chown -R www-data:www-data /var/www/.npm
        chmod -R 755 /var/www/.npm

    - name: Clean up any existing node_modules
      file:
        path: "{{ frontend_dir }}/node_modules"
        state: absent

    - name: Install npm dependencies for artemis-frontend
      shell: |
        cd {{ frontend_dir }}
        sudo -u www-data npm install --legacy-peer-deps
      environment:
        HOME: "{{ frontend_dir }}"
        NPM_CONFIG_CACHE: "/var/www/.npm"

    - name: Build artemis-frontend
      shell: |
        cd {{ frontend_dir }}
        sudo -u www-data npm run build
      environment:
        HOME: "{{ frontend_dir }}"
        NPM_CONFIG_CACHE: "/var/www/.npm"

    # Nginx setup
    - name: Create SSL directory for nginx
      file:
        path: "{{ ssl_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Generate SSL certificates for nginx
      command: >
        openssl req -x509 -newkey rsa:4096 -sha256 -nodes -days 3650
        -keyout {{ ssl_dir }}/artemis.key
        -out {{ ssl_dir }}/artemis.crt
        -subj "/C=SK/ST=Slovakia/L=Bratislava/O=STU/OU=ARTEMIS/CN=artemis-frontend"
      args:
        creates: "{{ ssl_dir }}/artemis.crt"

    - name: Set SSL certificate permissions for nginx
      file:
        path: "{{ item.path }}"
        owner: www-data
        group: www-data
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ ssl_dir }}/artemis.key", mode: '0600' }
        - { path: "{{ ssl_dir }}/artemis.crt", mode: '0644' }

    - name: Copy nginx configuration
      copy:
        src: "{{ frontend_dir }}/nginx.conf"
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
        backup: yes
    
    - name: Remove nginx.conf from artemis-frontend directory
      file:
        path: "{{ frontend_dir }}/nginx.conf"
        state: absent

    - name: Remove artemis-frontend.service from artemis-frontend directory
      file:
        path: "{{ frontend_dir }}/artemis-frontend.service"
        state: absent

    - name: Remove .env.example from artemis-frontend directory
      file:
        path: "{{ frontend_dir }}/.env.example"
        state: absent
    
    - name: Remove deploy.sh from artemis-frontend directory
      file:
        path: "{{ frontend_dir }}/deploy.sh"
        state: absent
    
    - name: Remove docs from artemis-frontend directory
      file:
        path: "{{ frontend_dir }}/docs"
        state: absent
    
    - name: Remove README.md from artemis-frontend directory
      file:
        path: "{{ frontend_dir }}/README.md"
        state: absent

    - name: Disable default nginx sites
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Validate nginx configuration
      command: nginx -t
      changed_when: false

    # Systemd daemon reload - must happen before starting services
    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    # Start and enable services
    - name: Start and enable scenario-manager-api service
      systemd:
        name: scenario-manager-api
        state: started
        enabled: yes

    - name: Start and enable artemis-frontend service
      systemd:
        name: artemis-frontend
        state: started
        enabled: yes

    - name: Start and enable nginx service
      systemd:
        name: nginx
        state: started
        enabled: yes

    # Additional systemd reload and nginx restart for extra safety
    - name: Final systemd daemon reload for safety
      systemd:
        daemon_reload: yes

    - name: Final nginx restart to ensure proper configuration loading
      systemd:
        name: nginx
        state: restarted